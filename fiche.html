<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EduCraft AI</title>

  <!-- ✅ FIX PRINCIPAL : Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans">

  <div class="max-w-4xl mx-auto p-6">

    <!-- Titre -->
    <h1 class="text-4xl font-bold mb-4">
      EduCraft AI
    </h1>

    <p class="text-gray-300 mb-6">
      Génère du contenu pédagogique en secondes.
    </p>

    <!-- Boutons -->
    <div class="flex gap-4 mb-8">
      <button class="bg-blue-600 px-4 py-2 rounded-lg">
        Générer un quiz
      </button>

      <button class="bg-green-600 px-4 py-2 rounded-lg">
        Rédiger un cours
      </button>
    </div>

    <!-- Formulaire -->
    <div class="bg-gray-800 p-4 rounded-xl">
      <input 
        id="input"
        class="w-full p-3 rounded bg-gray-700 mb-3"
        placeholder="Entre ta demande..."
      />

      <button onclick="handleSubmit()" 
        class="bg-yellow-500 px-4 py-2 rounded">
        Générer avec IA
      </button>
    </div>

    <!-- Résultat -->
    <div id="result" class="mt-6 text-gray-200"></div>

  </div>

  <script>
    async function handleSubmit() {
      const message = document.getElementById("input").value;

      const res = await fetch("/.netlify/functions/ai", {
        method: "POST",
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      document.getElementById("result").innerText =
        data.choices[0].message.content;
    }
  </script>

</body>
</html>
